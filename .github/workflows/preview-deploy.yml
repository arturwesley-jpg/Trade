name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy'
        required: true

concurrency:
  group: preview-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # Build preview environment
  build-preview:
    name: Build Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run type check
        run: npm run typecheck

      - name: Build all workspaces
        run: npm run build

      - name: Set PR number
        id: pr
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:pr-${{ steps.pr.outputs.number }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:preview-${{ github.sha }}
          cache-from: type=gha,scope=web-preview
          cache-to: type=gha,mode=max,scope=web-preview
          build-args: |
            NODE_ENV=preview
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # Deploy preview environment
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build-preview
    timeout-minutes: 10
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set PR number
        id: pr
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Deploy to preview environment
        env:
          PREVIEW_DEPLOY_TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
        run: |
          echo "Deploying preview for PR #${{ steps.pr.outputs.number }}"

          # Deploy using your preview environment provider
          # This could be Vercel, Netlify, or custom infrastructure

          # Example for custom deployment
          PREVIEW_URL="https://pr-${{ steps.pr.outputs.number }}.preview.trading-bot.example.com"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Wait for deployment
        run: sleep 30

      - name: Health check preview
        id: health
        run: |
          PREVIEW_URL="https://pr-${{ steps.pr.outputs.number }}.preview.trading-bot.example.com"

          MAX_RETRIES=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s "$PREVIEW_URL" > /dev/null; then
              echo "Preview is live!"
              echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for preview... ($((RETRY_COUNT + 1))/$MAX_RETRIES)"
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 10
          done

          echo "Preview deployment may have issues"
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const previewUrl = 'https://pr-' + prNumber + '.preview.trading-bot.example.com';

            const body = `## 🚀 Preview Deployment Ready

            Your preview environment has been deployed!

            **Preview URL:** ${previewUrl}

            **Commit:** \`${{ github.sha }}\`
            **Branch:** \`${{ github.head_ref }}\`

            ### What's included:
            - ✅ Full application build
            - ✅ Latest changes from this PR
            - ✅ Isolated environment

            ### Testing:
            - Test your changes in the preview environment
            - Share the preview URL with reviewers
            - Preview will be updated on each push

            ---
            *This preview will be automatically cleaned up when the PR is closed.*`;

            // Find existing preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: 'success'
          text: |
            🚀 Preview Deployed
            PR: #${{ steps.pr.outputs.number }}
            URL: https://pr-${{ steps.pr.outputs.number }}.preview.trading-bot.example.com
            Branch: ${{ github.head_ref }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Run preview tests
  preview-tests:
    name: Preview Tests
    runs-on: ubuntu-latest
    needs: deploy-preview
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set PR number
        id: pr
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Run preview smoke tests
        env:
          PREVIEW_URL: https://pr-${{ steps.pr.outputs.number }}.preview.trading-bot.example.com
        run: |
          echo "Running smoke tests against preview environment..."
          # Add your preview-specific tests here
          echo "Preview tests completed"

# Cleanup preview on PR close
cleanup-preview:
  name: Cleanup Preview
  runs-on: ubuntu-latest
  if: github.event.action == 'closed'

  steps:
    - name: Set PR number
      id: pr
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

    - name: Cleanup preview environment
      env:
        PREVIEW_DEPLOY_TOKEN: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
      run: |
        echo "Cleaning up preview for PR #${{ steps.pr.outputs.number }}"
        # Add cleanup logic here
        # This could involve deleting Kubernetes resources, Vercel deployments, etc.

    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = ${{ steps.pr.outputs.number }};

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: '🧹 Preview environment has been cleaned up.'
          });

    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: 'success'
        text: |
          🧹 Preview Cleaned Up
          PR: #${{ steps.pr.outputs.number }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true
