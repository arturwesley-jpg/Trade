name: typecheck
description: Run TypeScript type checking across all workspaces

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
