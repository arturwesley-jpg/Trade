name: E2E Nightly Tests

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  e2e-full-suite:
    name: Full E2E Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test infrastructure
        run: npm run test:e2e:setup

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be ready..."
          timeout=60
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if docker compose -f tests/e2e/docker-compose.test.yml ps | grep -q "healthy"; then
              echo "Services are healthy!"
              docker compose -f tests/e2e/docker-compose.test.yml ps
              exit 0
            fi
            echo "Waiting for services... ($elapsed/$timeout seconds)"
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "Services failed to become healthy in time"
          docker compose -f tests/e2e/docker-compose.test.yml ps
          docker compose -f tests/e2e/docker-compose.test.yml logs
          exit 1

      - name: Run full E2E test suite
        run: npm run test:e2e:ci
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5433/trade_test_db
          REDIS_URL: redis://localhost:6380
          BINGX_WS_URL: ws://localhost:8080/swap-market
          CI: true

      - name: Generate detailed HTML report
        if: always()
        run: |
          npx vitest --reporter=html --config=tests/e2e/vitest.config.e2e.ts || true

      - name: Upload full coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: e2e-nightly
          name: e2e-nightly-coverage
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-nightly-results
          path: |
            coverage/
            html/
            test-results.json
            tests/e2e/*.log
          retention-days: 90

      - name: Show service logs
        if: always()
        run: docker compose -f tests/e2e/docker-compose.test.yml logs

      - name: Teardown test infrastructure
        if: always()
        run: npm run test:e2e:teardown

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly E2E Tests Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Nightly E2E Test Failure\n\n` +
                    `The nightly E2E test suite has failed.\n\n` +
                    `**Run ID**: ${{ github.run_id }}\n` +
                    `**Workflow**: ${{ github.workflow }}\n` +
                    `**Commit**: ${{ github.sha }}\n\n` +
                    `[View full results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n` +
                    `Please investigate and fix the failing tests.`,
              labels: ['bug', 'e2e-tests', 'automated']
            });
            console.log(`Created issue #${issue.data.number}`);
