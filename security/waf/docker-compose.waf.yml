version: '3.8'

services:
  # Nginx with ModSecurity WAF
  waf:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: trade-waf
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-modsecurity.conf:/etc/nginx/nginx.conf:ro
      - ./modsec-main.conf:/etc/nginx/modsec/main.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - waf_logs:/var/log/nginx
      - modsec_logs:/var/log/modsec
    environment:
      - PARANOIA=2
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - BLOCKING_PARANOIA=2
      - PROXY_SSL_VERIFY=off
      - PROXY_SSL_CERT_KEY=/etc/nginx/ssl/key.pem
      - PROXY_SSL_CERT=/etc/nginx/ssl/cert.pem
    networks:
      - trade-network
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # API backend (from main docker-compose)
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-api:${IMAGE_TAG:-latest}
    container_name: trade-api-waf
    restart: always
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
    networks:
      - trade-network
    expose:
      - "4000"

  # Web frontend (from main docker-compose)
  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-web:${IMAGE_TAG:-latest}
    container_name: trade-web-waf
    restart: always
    networks:
      - trade-network
    expose:
      - "80"

  # WAF log aggregator
  waf-logs:
    image: fluent/fluent-bit:latest
    container_name: trade-waf-logs
    restart: always
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - waf_logs:/var/log/nginx:ro
      - modsec_logs:/var/log/modsec:ro
    networks:
      - trade-network
    depends_on:
      - waf

networks:
  trade-network:
    driver: bridge

volumes:
  waf_logs:
    driver: local
  modsec_logs:
    driver: local
