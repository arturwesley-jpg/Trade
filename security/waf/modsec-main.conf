# ModSecurity Main Configuration
# OWASP ModSecurity Core Rule Set (CRS) Configuration

# Basic configuration
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyInMemoryLimit 131072
SecRequestBodyLimitAction Reject

# Audit logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec_audit.log

# Debug logging (disable in production)
SecDebugLog /var/log/modsec_debug.log
SecDebugLogLevel 0

# File upload handling
SecTmpDir /tmp/
SecDataDir /tmp/
SecUploadDir /tmp/
SecUploadKeepFiles Off

# Argument separator
SecArgumentSeparator &

# Cookie format
SecCookieFormat 0

# Unicode mapping
SecUnicodeMapFile unicode.mapping 20127

# Collection timeout
SecCollectionTimeout 600

# Custom rules for Trading Bot

# Rule 1: Block SQL injection attempts
SecRule REQUEST_URI|ARGS|REQUEST_BODY "@detectSQLi" \
    "id:1001,\
    phase:2,\
    block,\
    log,\
    msg:'SQL Injection Attack Detected',\
    severity:CRITICAL,\
    tag:'application-multi',\
    tag:'language-multi',\
    tag:'platform-multi',\
    tag:'attack-sqli'"

# Rule 2: Block XSS attempts
SecRule REQUEST_URI|ARGS|REQUEST_BODY "@detectXSS" \
    "id:1002,\
    phase:2,\
    block,\
    log,\
    msg:'XSS Attack Detected',\
    severity:CRITICAL,\
    tag:'application-multi',\
    tag:'language-multi',\
    tag:'platform-multi',\
    tag:'attack-xss'"

# Rule 3: Block command injection
SecRule ARGS|REQUEST_BODY "@rx (?:;|\||`|>|<|&|\$\(|\$\{)" \
    "id:1003,\
    phase:2,\
    block,\
    log,\
    msg:'Command Injection Attack Detected',\
    severity:CRITICAL,\
    tag:'attack-injection-generic'"

# Rule 4: Block path traversal
SecRule REQUEST_URI|ARGS "@rx (?:\.\.\/|\.\.\\\\)" \
    "id:1004,\
    phase:1,\
    block,\
    log,\
    msg:'Path Traversal Attack Detected',\
    severity:CRITICAL,\
    tag:'attack-path-traversal'"

# Rule 5: Enforce JSON content type for API endpoints
SecRule REQUEST_URI "@beginsWith /api" \
    "id:1005,\
    phase:1,\
    chain,\
    log,\
    msg:'Invalid Content-Type for API endpoint'"
    SecRule REQUEST_METHOD "@rx ^(?:POST|PUT|PATCH)$" \
        "chain"
    SecRule REQUEST_HEADERS:Content-Type "!@rx ^application/json" \
        "block"

# Rule 6: Block suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?:sqlmap|nikto|nmap|masscan|nessus|openvas|metasploit)" \
    "id:1006,\
    phase:1,\
    block,\
    log,\
    msg:'Malicious User Agent Detected',\
    severity:WARNING,\
    tag:'attack-reputation-scanner'"

# Rule 7: Rate limiting for authentication endpoints
SecAction \
    "id:1007,\
    phase:1,\
    nolog,\
    pass,\
    initcol:ip=%{REMOTE_ADDR},\
    setvar:ip.auth_attempts=+1,\
    expirevar:ip.auth_attempts=300"

SecRule REQUEST_URI "@beginsWith /api/auth" \
    "id:1008,\
    phase:1,\
    chain,\
    log,\
    msg:'Authentication rate limit exceeded'"
    SecRule IP:AUTH_ATTEMPTS "@gt 20" \
        "block,\
        status:429"

# Rule 8: Block requests with no User-Agent
SecRule REQUEST_HEADERS:User-Agent "@rx ^$" \
    "id:1009,\
    phase:1,\
    block,\
    log,\
    msg:'Request with no User-Agent',\
    severity:WARNING"

# Rule 9: Validate JWT token format (basic check)
SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer\s+[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+$" \
    "id:1010,\
    phase:1,\
    pass,\
    nolog,\
    t:none"

SecRule REQUEST_URI "@beginsWith /api" \
    "id:1011,\
    phase:1,\
    chain,\
    log,\
    msg:'Invalid or missing JWT token'"
    SecRule REQUEST_URI "!@rx ^/api/(auth|health)" \
        "chain"
    SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer\s+[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+$" \
        "block,\
        status:401"

# Rule 10: Block requests with suspicious query strings
SecRule QUERY_STRING "@rx (?:<script|javascript:|onerror=|onload=)" \
    "id:1012,\
    phase:1,\
    block,\
    log,\
    msg:'Suspicious query string detected',\
    severity:WARNING,\
    tag:'attack-xss'"

# Rule 11: Limit request size for order endpoints
SecRule REQUEST_URI "@beginsWith /api/orders" \
    "id:1013,\
    phase:1,\
    chain,\
    log,\
    msg:'Request body too large for order endpoint'"
    SecRule REQUEST_HEADERS:Content-Length "@gt 10240" \
        "block,\
        status:413"

# Rule 12: Block requests from known bad IPs (placeholder - populate with actual IPs)
# SecRule REMOTE_ADDR "@ipMatch 192.0.2.1,198.51.100.0/24" \
#     "id:1014,\
#     phase:1,\
#     block,\
#     log,\
#     msg:'Request from blocked IP address',\
#     severity:CRITICAL"

# Rule 13: Detect and block brute force attempts
SecAction \
    "id:1015,\
    phase:5,\
    nolog,\
    pass,\
    initcol:ip=%{REMOTE_ADDR},\
    setvar:ip.failed_auth=+1,\
    expirevar:ip.failed_auth=3600"

SecRule RESPONSE_STATUS "@rx ^401$" \
    "id:1016,\
    phase:5,\
    chain,\
    log,\
    msg:'Multiple failed authentication attempts'"
    SecRule IP:FAILED_AUTH "@gt 10" \
        "block,\
        status:403"

# Include OWASP CRS rules
Include /etc/nginx/modsec/crs/crs-setup.conf
Include /etc/nginx/modsec/crs/rules/*.conf
