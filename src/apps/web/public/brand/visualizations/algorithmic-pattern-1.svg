<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F3A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00FF88;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg1)"/>

  <!-- Animated circles (representing data flow) -->
  <circle cx="200" cy="200" r="100" fill="url(#glow1)" opacity="0.3">
    <animate attributeName="r" values="100;120;100" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="600" r="80" fill="url(#glow2)" opacity="0.3">
    <animate attributeName="r" values="80;100;80" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="200" r="60" fill="url(#glow1)" opacity="0.2">
    <animate attributeName="r" values="60;80;60" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Algorithmic pattern - Fibonacci spiral -->
  <g transform="translate(400, 400)" opacity="0.4">
    <path d="M 0 0 Q 50 0, 50 50 Q 50 100, 0 100 Q -100 100, -100 0 Q -100 -150, 50 -150 Q 250 -150, 250 100"
          stroke="#00D4FF"
          stroke-width="2"
          fill="none"
          stroke-dasharray="5,5"/>
  </g>

  <!-- Geometric trading pattern -->
  <g transform="translate(150, 400)" opacity="0.5">
    <!-- Ascending triangles -->
    <path d="M 0 100 L 50 50 L 100 100 L 150 30 L 200 100 L 250 10 L 300 100"
          stroke="#00FF88"
          stroke-width="3"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Support/Resistance lines -->
    <line x1="0" y1="100" x2="300" y2="100" stroke="#00D4FF" stroke-width="1" stroke-dasharray="10,5" opacity="0.5"/>
    <line x1="0" y1="50" x2="300" y2="50" stroke="#FF4757" stroke-width="1" stroke-dasharray="10,5" opacity="0.5"/>
  </g>

  <!-- Data nodes network -->
  <g opacity="0.6">
    <circle cx="400" cy="150" r="8" fill="#00D4FF"/>
    <circle cx="300" cy="250" r="8" fill="#00D4FF"/>
    <circle cx="500" cy="250" r="8" fill="#00D4FF"/>
    <circle cx="400" cy="350" r="8" fill="#00FF88"/>
    <circle cx="250" cy="350" r="8" fill="#00D4FF"/>
    <circle cx="550" cy="350" r="8" fill="#00D4FF"/>

    <line x1="400" y1="150" x2="300" y2="250" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
    <line x1="400" y1="150" x2="500" y2="250" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
    <line x1="300" y1="250" x2="400" y2="350" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="250" x2="400" y2="350" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
    <line x1="300" y1="250" x2="250" y2="350" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
    <line x1="500" y1="250" x2="550" y2="350" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Candlestick pattern art -->
  <g transform="translate(250, 550)">
    <rect x="0" y="20" width="15" height="40" fill="#00FF88" rx="2"/>
    <line x1="7.5" y1="10" x2="7.5" y2="70" stroke="#00FF88" stroke-width="2"/>

    <rect x="40" y="30" width="15" height="40" fill="#FF4757" rx="2"/>
    <line x1="47.5" y1="20" x2="47.5" y2="80" stroke="#FF4757" stroke-width="2"/>

    <rect x="80" y="15" width="15" height="40" fill="#00FF88" rx="2"/>
    <line x1="87.5" y1="5" x2="87.5" y2="65" stroke="#00FF88" stroke-width="2"/>

    <rect x="120" y="10" width="15" height="40" fill="#00FF88" rx="2"/>
    <line x1="127.5" y1="0" x2="127.5" y2="60" stroke="#00FF88" stroke-width="2"/>

    <rect x="160" y="5" width="15" height="40" fill="#00FF88" rx="2"/>
    <line x1="167.5" y1="-5" x2="167.5" y2="55" stroke="#00FF88" stroke-width="2"/>

    <rect x="200" y="0" width="15" height="40" fill="#00FF88" rx="2"/>
    <line x1="207.5" y1="-10" x2="207.5" y2="50" stroke="#00FF88" stroke-width="2"/>

    <rect x="240" y="10" width="15" height="40" fill="#FF4757" rx="2"/>
    <line x1="247.5" y1="0" x2="247.5" y2="60" stroke="#FF4757" stroke-width="2"/>

    <rect x="280" y="-5" width="15" height="40" fill="#00FF88" rx="2"/>
    <line x1="287.5" y1="-15" x2="287.5" y2="45" stroke="#00FF88" stroke-width="2"/>
  </g>

  <!-- Wave pattern (market cycles) -->
  <g transform="translate(100, 650)" opacity="0.3">
    <path d="M 0 0 Q 50 -30, 100 0 T 200 0 T 300 0 T 400 0 T 500 0 T 600 0"
          stroke="#00D4FF"
          stroke-width="2"
          fill="none"/>
    <path d="M 0 20 Q 50 -10, 100 20 T 200 20 T 300 20 T 400 20 T 500 20 T 600 20"
          stroke="#0066FF"
          stroke-width="2"
          fill="none"/>
  </g>
</svg>
