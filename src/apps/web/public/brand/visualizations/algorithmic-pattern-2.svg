<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="genBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F3A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#genBg)"/>

  <!-- Generative pattern based on market data -->
  <!-- Voronoi-like cells representing market segments -->
  <g opacity="0.3">
    <path d="M 100 100 L 250 80 L 300 200 L 150 250 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 250 80 L 400 100 L 380 220 L 300 200 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>
    <path d="M 400 100 L 550 120 L 500 250 L 380 220 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 550 120 L 700 100 L 650 240 L 500 250 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>

    <path d="M 100 250 L 150 250 L 200 400 L 80 420 Z" fill="#00FF88" opacity="0.2" stroke="#00FF88" stroke-width="1"/>
    <path d="M 150 250 L 300 200 L 320 380 L 200 400 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 300 200 L 380 220 L 400 380 L 320 380 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>
    <path d="M 380 220 L 500 250 L 520 400 L 400 380 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 500 250 L 650 240 L 680 390 L 520 400 Z" fill="#00FF88" opacity="0.2" stroke="#00FF88" stroke-width="1"/>
    <path d="M 650 240 L 720 260 L 750 400 L 680 390 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>

    <path d="M 80 420 L 200 400 L 220 550 L 100 580 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>
    <path d="M 200 400 L 320 380 L 340 540 L 220 550 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 320 380 L 400 380 L 420 550 L 340 540 Z" fill="#00FF88" opacity="0.2" stroke="#00FF88" stroke-width="1"/>
    <path d="M 400 380 L 520 400 L 540 560 L 420 550 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>
    <path d="M 520 400 L 680 390 L 700 550 L 540 560 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 680 390 L 750 400 L 770 560 L 700 550 Z" fill="#00FF88" opacity="0.2" stroke="#00FF88" stroke-width="1"/>

    <path d="M 100 580 L 220 550 L 250 700 L 120 720 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 220 550 L 340 540 L 360 690 L 250 700 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>
    <path d="M 340 540 L 420 550 L 440 700 L 360 690 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
    <path d="M 420 550 L 540 560 L 560 710 L 440 700 Z" fill="#00FF88" opacity="0.2" stroke="#00FF88" stroke-width="1"/>
    <path d="M 540 560 L 700 550 L 720 700 L 560 710 Z" fill="#0066FF" opacity="0.2" stroke="#0066FF" stroke-width="1"/>
    <path d="M 700 550 L 770 560 L 780 710 L 720 700 Z" fill="#00D4FF" opacity="0.2" stroke="#00D4FF" stroke-width="1"/>
  </g>

  <!-- Connecting nodes (data points) -->
  <g opacity="0.6">
    <circle cx="175" cy="165" r="4" fill="#00D4FF"/>
    <circle cx="325" cy="140" r="4" fill="#0066FF"/>
    <circle cx="475" cy="185" r="4" fill="#00D4FF"/>
    <circle cx="625" cy="170" r="4" fill="#0066FF"/>

    <circle cx="125" cy="335" r="4" fill="#00FF88"/>
    <circle cx="260" cy="325" r="4" fill="#00D4FF"/>
    <circle cx="390" cy="300" r="4" fill="#0066FF"/>
    <circle cx="510" cy="325" r="4" fill="#00D4FF"/>
    <circle cx="665" cy="315" r="4" fill="#00FF88"/>

    <circle cx="140" cy="500" r="4" fill="#0066FF"/>
    <circle cx="270" cy="475" r="4" fill="#00D4FF"/>
    <circle cx="380" cy="460" r="4" fill="#00FF88"/>
    <circle cx="480" cy="475" r="4" fill="#0066FF"/>
    <circle cx="610" cy="470" r="4" fill="#00D4FF"/>

    <circle cx="160" cy="650" r="4" fill="#00D4FF"/>
    <circle cx="300" cy="620" r="4" fill="#0066FF"/>
    <circle cx="400" cy="625" r="4" fill="#00D4FF"/>
    <circle cx="500" cy="635" r="4" fill="#00FF88"/>
    <circle cx="660" cy="625" r="4" fill="#0066FF"/>
  </g>

  <!-- Overlay wave pattern -->
  <g opacity="0.2">
    <path d="M 0 400 Q 100 350, 200 400 T 400 400 T 600 400 T 800 400"
          stroke="#00D4FF"
          stroke-width="2"
          fill="none"/>
    <path d="M 0 420 Q 100 370, 200 420 T 400 420 T 600 420 T 800 420"
          stroke="#0066FF"
          stroke-width="2"
          fill="none"/>
    <path d="M 0 440 Q 100 390, 200 440 T 400 440 T 600 440 T 800 440"
          stroke="#00D4FF"
          stroke-width="2"
          fill="none"/>
  </g>

  <!-- Circular data visualization -->
  <g transform="translate(400, 400)" opacity="0.4">
    <circle cx="0" cy="0" r="150" stroke="#00D4FF" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="120" stroke="#0066FF" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="90" stroke="#00D4FF" stroke-width="1" fill="none"/>
    <circle cx="0" cy="0" r="60" stroke="#00FF88" stroke-width="1" fill="none"/>

    <!-- Radial lines -->
    <line x1="0" y1="-150" x2="0" y2="-60" stroke="#00D4FF" stroke-width="1"/>
    <line x1="106" y1="-106" x2="42" y2="-42" stroke="#00D4FF" stroke-width="1"/>
    <line x1="150" y1="0" x2="60" y2="0" stroke="#00D4FF" stroke-width="1"/>
    <line x1="106" y1="106" x2="42" y2="42" stroke="#00D4FF" stroke-width="1"/>
    <line x1="0" y1="150" x2="0" y2="60" stroke="#00D4FF" stroke-width="1"/>
    <line x1="-106" y1="106" x2="-42" y2="42" stroke="#00D4FF" stroke-width="1"/>
    <line x1="-150" y1="0" x2="-60" y2="0" stroke="#00D4FF" stroke-width="1"/>
    <line x1="-106" y1="-106" x2="-42" y2="-42" stroke="#00D4FF" stroke-width="1"/>
  </g>
</svg>
