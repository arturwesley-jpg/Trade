<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neuralBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F3A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#neuralBg)"/>

  <!-- Neural network layers -->
  <!-- Input layer -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="0" r="15" fill="#00D4FF" opacity="0.8"/>
    <circle cx="0" cy="0" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="50" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">Price</text>

    <circle cx="0" cy="100" r="15" fill="#00D4FF" opacity="0.8"/>
    <circle cx="0" cy="100" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="150" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">Volume</text>

    <circle cx="0" cy="200" r="15" fill="#00D4FF" opacity="0.8"/>
    <circle cx="0" cy="200" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="250" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">RSI</text>

    <circle cx="0" cy="300" r="15" fill="#00D4FF" opacity="0.8"/>
    <circle cx="0" cy="300" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="350" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">MACD</text>

    <circle cx="0" cy="400" r="15" fill="#00D4FF" opacity="0.8"/>
    <circle cx="0" cy="400" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="450" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">Sentiment</text>
  </g>

  <!-- Hidden layer 1 -->
  <g transform="translate(300, 150)">
    <circle cx="0" cy="0" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="100" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="200" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="300" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="350" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="450" r="12" fill="#0066FF" opacity="0.8"/>
  </g>

  <!-- Hidden layer 2 -->
  <g transform="translate(500, 200)">
    <circle cx="0" cy="0" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="100" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="200" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="300" r="12" fill="#0066FF" opacity="0.8"/>
    <circle cx="0" cy="400" r="12" fill="#0066FF" opacity="0.8"/>
  </g>

  <!-- Output layer -->
  <g transform="translate(700, 250)">
    <circle cx="0" cy="0" r="15" fill="#00FF88" opacity="0.8"/>
    <circle cx="0" cy="0" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="50" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">BUY</text>

    <circle cx="0" cy="100" r="15" fill="#FF4757" opacity="0.8"/>
    <circle cx="0" cy="100" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="150" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">SELL</text>

    <circle cx="0" cy="200" r="15" fill="#6B7280" opacity="0.8"/>
    <circle cx="0" cy="200" r="25" fill="url(#nodeGlow)" opacity="0.3"/>
    <text x="0" y="250" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">HOLD</text>
  </g>

  <!-- Connections (input to hidden1) -->
  <g opacity="0.2">
    <line x1="100" y1="200" x2="300" y2="150" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="200" x2="300" y2="250" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="200" x2="300" y2="350" stroke="#00D4FF" stroke-width="1"/>

    <line x1="100" y1="300" x2="300" y2="150" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="300" x2="300" y2="250" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="300" x2="300" y2="350" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="300" x2="300" y2="450" stroke="#00D4FF" stroke-width="1"/>

    <line x1="100" y1="400" x2="300" y2="250" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="400" x2="300" y2="350" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="400" x2="300" y2="450" stroke="#00D4FF" stroke-width="1"/>

    <line x1="100" y1="500" x2="300" y2="350" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="500" x2="300" y2="450" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="500" x2="300" y2="550" stroke="#00D4FF" stroke-width="1"/>

    <line x1="100" y1="600" x2="300" y2="450" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="600" x2="300" y2="550" stroke="#00D4FF" stroke-width="1"/>
    <line x1="100" y1="600" x2="300" y2="600" stroke="#00D4FF" stroke-width="1"/>
  </g>

  <!-- Connections (hidden1 to hidden2) -->
  <g opacity="0.3">
    <line x1="300" y1="150" x2="500" y2="200" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="150" x2="500" y2="300" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="250" x2="500" y2="300" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="250" x2="500" y2="400" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="350" x2="500" y2="300" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="350" x2="500" y2="400" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="450" x2="500" y2="400" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="450" x2="500" y2="500" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="550" x2="500" y2="500" stroke="#0066FF" stroke-width="1.5"/>
    <line x1="300" y1="550" x2="500" y2="600" stroke="#0066FF" stroke-width="1.5"/>
  </g>

  <!-- Connections (hidden2 to output) - highlighted -->
  <g opacity="0.6">
    <line x1="500" y1="200" x2="700" y2="250" stroke="#00FF88" stroke-width="2"/>
    <line x1="500" y1="300" x2="700" y2="250" stroke="#00FF88" stroke-width="2"/>
    <line x1="500" y1="400" x2="700" y2="350" stroke="#FF4757" stroke-width="2"/>
    <line x1="500" y1="500" x2="700" y2="350" stroke="#FF4757" stroke-width="2"/>
    <line x1="500" y1="600" x2="700" y2="450" stroke="#6B7280" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00D4FF" text-anchor="middle">
    AI Neural Network
  </text>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">
    Signal Generation Model
  </text>

  <!-- Data flow animation indicators -->
  <g opacity="0.8">
    <circle cx="200" cy="200" r="3" fill="#00D4FF">
      <animate attributeName="cx" values="100;300" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="300" r="3" fill="#00D4FF">
      <animate attributeName="cx" values="100;300" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="250" r="3" fill="#0066FF">
      <animate attributeName="cx" values="300;500" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="250" r="3" fill="#00FF88">
      <animate attributeName="cx" values="500;700" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
