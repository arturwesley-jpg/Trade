<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main circular background with gradient -->
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#mainGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="95" stroke="url(#mainGradient)" stroke-width="2" fill="none"/>

  <!-- Trading chart candlestick pattern -->
  <g transform="translate(40, 60)">
    <!-- Bullish candle 1 -->
    <line x1="10" y1="50" x2="10" y2="20" stroke="#00FF88" stroke-width="2"/>
    <rect x="5" y="30" width="10" height="20" fill="#00FF88" rx="1"/>

    <!-- Bearish candle 2 -->
    <line x1="30" y1="60" x2="30" y2="30" stroke="#FF4757" stroke-width="2"/>
    <rect x="25" y="40" width="10" height="20" fill="#FF4757" rx="1"/>

    <!-- Bullish candle 3 -->
    <line x1="50" y1="45" x2="50" y2="15" stroke="#00FF88" stroke-width="2"/>
    <rect x="45" y="25" width="10" height="20" fill="#00FF88" rx="1"/>

    <!-- Bullish candle 4 -->
    <line x1="70" y1="40" x2="70" y2="10" stroke="#00FF88" stroke-width="2"/>
    <rect x="65" y="20" width="10" height="20" fill="#00FF88" rx="1"/>

    <!-- Bearish candle 5 -->
    <line x1="90" y1="50" x2="90" y2="25" stroke="#FF4757" stroke-width="2"/>
    <rect x="85" y="30" width="10" height="20" fill="#FF4757" rx="1"/>

    <!-- Bullish candle 6 -->
    <line x1="110" y1="35" x2="110" y2="5" stroke="#00FF88" stroke-width="2"/>
    <rect x="105" y="15" width="10" height="20" fill="#00FF88" rx="1"/>
  </g>

  <!-- AI Neural network nodes overlay -->
  <g opacity="0.6" filter="url(#glow)">
    <circle cx="60" cy="100" r="4" fill="url(#accentGradient)"/>
    <circle cx="100" cy="80" r="4" fill="url(#accentGradient)"/>
    <circle cx="140" cy="100" r="4" fill="url(#accentGradient)"/>
    <circle cx="100" cy="120" r="4" fill="url(#accentGradient)"/>

    <!-- Connecting lines -->
    <line x1="60" y1="100" x2="100" y2="80" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="80" x2="140" y2="100" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="100" x2="100" y2="120" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="120" x2="140" y2="100" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Upward trend arrow -->
  <path d="M 100 140 L 100 160 M 95 145 L 100 140 L 105 145"
        stroke="url(#accentGradient)"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
