      <rect x="3" y="12" width="4" height="8" fill="#00FF88" rx="0.5"/>
      <line x1="15" y1="25" x2="15" y2="15" stroke="#FF4757" stroke-width="2"/>
      <rect x="13" y="17" width="4" height="8" fill="#FF4757" rx="0.5"/>
      <line x1="25" y1="18" x2="25" y2="8" stroke="#00FF88" stroke-width="2"/>
      <rect x="23" y="10" width="4" height="8" fill="#00FF88" rx="0.5"/>
      <line x1="35" y1="15" x2="35" y2="5" stroke="#00FF88" stroke-width="2"/>
      <rect x="33" y="7" width="4" height="8" fill="#00FF88" rx="0.5"/>
