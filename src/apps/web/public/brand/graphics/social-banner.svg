<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1F3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <path d="M0 0 L1200 0 M0 50 L1200 50 M0 100 L1200 100 M0 150 L1200 150 M0 200 L1200 200 M0 250 L1200 250 M0 300 L1200 300 M0 350 L1200 350 M0 400 L1200 400 M0 450 L1200 450 M0 500 L1200 500 M0 550 L1200 550 M0 600 L1200 600" stroke="#00D4FF" stroke-width="1"/>
    <path d="M0 0 L0 630 M100 0 L100 630 M200 0 L200 630 M300 0 L300 630 M400 0 L400 630 M500 0 L500 630 M600 0 L600 630 M700 0 L700 630 M800 0 L800 630 M900 0 L900 630 M1000 0 L1000 630 M1100 0 L1100 630 M1200 0 L1200 630" stroke="#00D4FF" stroke-width="1"/>
  </g>

  <!-- Algorithmic chart visualization -->
  <g transform="translate(700, 150)" opacity="0.6" filter="url(#glow)">
    <!-- Candlesticks -->
    <line x1="50" y1="200" x2="50" y2="150" stroke="#00FF88" stroke-width="3"/>
    <rect x="42" y="160" width="16" height="40" fill="#00FF88" rx="2"/>

    <line x1="100" y1="220" x2="100" y2="170" stroke="#FF4757" stroke-width="3"/>
    <rect x="92" y="180" width="16" height="40" fill="#FF4757" rx="2"/>

    <line x1="150" y1="180" x2="150" y2="130" stroke="#00FF88" stroke-width="3"/>
    <rect x="142" y="140" width="16" height="40" fill="#00FF88" rx="2"/>

    <line x1="200" y1="160" x2="200" y2="110" stroke="#00FF88" stroke-width="3"/>
    <rect x="192" y="120" width="16" height="40" fill="#00FF88" rx="2"/>

    <line x1="250" y1="140" x2="250" y2="90" stroke="#00FF88" stroke-width="3"/>
    <rect x="242" y="100" width="16" height="40" fill="#00FF88" rx="2"/>

    <line x1="300" y1="120" x2="300" y2="70" stroke="#00FF88" stroke-width="3"/>
    <rect x="292" y="80" width="16" height="40" fill="#00FF88" rx="2"/>

    <!-- Trend line -->
    <path d="M 50 180 Q 150 150, 300 90" stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(80, 200)">
    <rect width="120" height="120" rx="20" fill="url(#accentGradient)" filter="url(#glow)"/>
    <g transform="translate(20, 30)">
      <line x1="10" y1="40" x2="10" y2="20" stroke="#0A0E27" stroke-width="4"/>
      <rect x="6" y="24" width="8" height="16" fill="#0A0E27" rx="1"/>

      <line x1="30" y1="50" x2="30" y2="30" stroke="#0A0E27" stroke-width="4"/>
      <rect x="26" y="34" width="8" height="16" fill="#0A0E27" rx="1"/>

      <line x1="50" y1="36" x2="50" y2="16" stroke="#0A0E27" stroke-width="4"/>
      <rect x="46" y="20" width="8" height="16" fill="#0A0E27" rx="1"/>

      <line x1="70" y1="30" x2="70" y2="10" stroke="#0A0E27" stroke-width="4"/>
      <rect x="66" y="14" width="8" height="16" fill="#0A0E27" rx="1"/>
    </g>
    <path d="M 60 80 L 60 95 M 55 85 L 60 80 L 65 85"
          stroke="#0A0E27"
          stroke-width="5"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- Main text -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    TRADEBOT
  </text>
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="32" fill="#00D4FF">
    AI-Powered Trading Platform
  </text>

  <!-- Feature badges -->
  <g transform="translate(80, 480)">
    <rect width="180" height="40" rx="20" fill="#00D4FF" opacity="0.2"/>
    <text x="90" y="27" font-family="Arial, sans-serif" font-size="18" fill="#00D4FF" text-anchor="middle">Real-Time Signals</text>
  </g>
  <g transform="translate(280, 480)">
    <rect width="180" height="40" rx="20" fill="#00FF88" opacity="0.2"/>
    <text x="90" y="27" font-family="Arial, sans-serif" font-size="18" fill="#00FF88" text-anchor="middle">Auto Trading</text>
  </g>
  <g transform="translate(480, 480)">
    <rect width="180" height="40" rx="20" fill="#0066FF" opacity="0.2"/>
    <text x="90" y="27" font-family="Arial, sans-serif" font-size="18" fill="#0066FF" text-anchor="middle">Smart Analytics</text>
  </g>
</svg>
