apiVersion: v1
kind: Secret
metadata:
  name: trading-bot-secrets
  namespace: trading-bot
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "trade_user"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "trade_db"
  DATABASE_URL: "postgresql://trade_user:CHANGE_ME@postgres:5432/trade_db"

  # Redis
  REDIS_PASSWORD: "CHANGE_ME"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"

  # JWT
  JWT_SECRET: "CHANGE_ME_MIN_32_CHARS"
  JWT_REFRESH_SECRET: "CHANGE_ME_MIN_32_CHARS"
  SESSION_SECRET: "CHANGE_ME_MIN_32_CHARS"

  # Exchange API Keys (leave empty for paper trading)
  BINANCE_API_KEY: ""
  BINANCE_API_SECRET: ""
  BYBIT_API_KEY: ""
  BYBIT_API_SECRET: ""
  OKX_API_KEY: ""
  OKX_API_SECRET: ""

  # Telegram
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_ALLOWED_USER_IDS: ""

  # Monitoring
  GRAFANA_ADMIN_PASSWORD: "CHANGE_ME"
  SLACK_WEBHOOK_URL: ""
