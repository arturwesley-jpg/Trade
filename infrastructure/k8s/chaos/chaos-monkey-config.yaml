apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: trading-bot-chaos-schedule
  namespace: trading-bot
spec:
  schedule: "0 2 * * *"  # Run at 2 AM daily
  historyLimit: 5
  concurrencyPolicy: Forbid
  type: PodChaos
  podChaos:
    action: pod-kill
    mode: one
    selector:
      namespaces:
        - trading-bot
      labelSelectors:
        app: trading-bot-api
    scheduler:
      cron: "@every 1h"

---

apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-failure-test
  namespace: trading-bot
spec:
  action: pod-failure
  mode: one
  duration: "30s"
  selector:
    namespaces:
      - trading-bot
    labelSelectors:
      app: trading-bot-api
  scheduler:
    cron: "@every 6h"

---

apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-test
  namespace: trading-bot
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - trading-bot
    labelSelectors:
      app: trading-bot-api
  delay:
    latency: "100ms"
    correlation: "25"
    jitter: "10ms"
  duration: "5m"
  scheduler:
    cron: "@every 12h"

---

apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-partition-test
  namespace: trading-bot
spec:
  action: partition
  mode: one
  selector:
    namespaces:
      - trading-bot
    labelSelectors:
      app: trading-bot-api
  direction: to
  target:
    mode: one
    selector:
      namespaces:
        - trading-bot
      labelSelectors:
        app: postgres
  duration: "2m"
  scheduler:
    cron: "0 3 * * 0"  # Weekly on Sunday at 3 AM

---

apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress-test
  namespace: trading-bot
spec:
  mode: one
  selector:
    namespaces:
      - trading-bot
    labelSelectors:
      app: trading-bot-api
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "3m"
  scheduler:
    cron: "@every 24h"

---

apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: memory-stress-test
  namespace: trading-bot
spec:
  mode: one
  selector:
    namespaces:
      - trading-bot
    labelSelectors:
      app: trading-bot-api
  stressors:
    memory:
      workers: 1
      size: "256MB"
  duration: "2m"
  scheduler:
    cron: "@every 24h"

---

apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: io-delay-test
  namespace: trading-bot
spec:
  action: latency
  mode: one
  selector:
    namespaces:
      - trading-bot
    labelSelectors:
      app: postgres
  volumePath: /var/lib/postgresql/data
  path: "**/*"
  delay: "100ms"
  percent: 50
  duration: "5m"
  scheduler:
    cron: "0 4 * * 0"  # Weekly on Sunday at 4 AM
