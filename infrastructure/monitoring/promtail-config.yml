server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

  # Application logs
  - job_name: trading-bot-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: trading-bot-api
          __path__: /var/log/trading-bot/api/*.log

  - job_name: trading-bot-telegram
    static_configs:
      - targets:
          - localhost
        labels:
          job: trading-bot-telegram
          __path__: /var/log/trading-bot/telegram/*.log

  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  # Nginx logs
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log

# Pipeline stages for log parsing
pipeline_stages:
  # Parse JSON logs
  - json:
      expressions:
        level: level
        message: message
        timestamp: timestamp
        service: service
        trace_id: trace_id

  # Extract log level
  - labels:
      level:
      service:

  # Parse timestamp
  - timestamp:
      source: timestamp
      format: RFC3339

  # Drop debug logs in production
  - match:
      selector: '{level="debug"}'
      action: drop

  # Add metrics
  - metrics:
      error_total:
        type: Counter
        description: "Total number of errors"
        source: level
        config:
          action: inc
          match_all: true
          value: "1"
