version: '3.8'

# Blue Environment - Production Active
services:
  # PostgreSQL Database (Shared)
  postgres:
    image: postgres:16-alpine
    container_name: trade-postgres-shared
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trade_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trade_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trade_user} -d ${POSTGRES_DB:-trade_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trade-network

  # Redis Cache (Shared)
  redis:
    image: redis:7-alpine
    container_name: trade-redis-shared
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - trade-network

  # API Server - Blue
  api-blue:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-api:${BLUE_TAG:-blue}
    container_name: trade-api-blue
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DEPLOYMENT_SLOT: blue
      DATABASE_URL: postgresql://${POSTGRES_USER:-trade_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trade_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
    volumes:
      - api_blue_data:/app/data
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trade-network
    labels:
      - "deployment.slot=blue"
      - "deployment.active=true"

  # Worker - Blue
  worker-blue:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-worker:${BLUE_TAG:-blue}
    container_name: trade-worker-blue
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DEPLOYMENT_SLOT: blue
      DATABASE_URL: postgresql://${POSTGRES_USER:-trade_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trade_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
    volumes:
      - worker_blue_data:/app/data
    networks:
      - trade-network
    labels:
      - "deployment.slot=blue"
      - "deployment.active=true"

  # Telegram Bot - Blue
  telegram-bot-blue:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-telegram-bot:${BLUE_TAG:-blue}
    container_name: trade-telegram-bot-blue
    restart: always
    depends_on:
      - api-blue
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DEPLOYMENT_SLOT: blue
      API_BASE_URL: http://api-blue:4000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
    networks:
      - trade-network
    labels:
      - "deployment.slot=blue"
      - "deployment.active=true"

  # Web Frontend - Blue
  web-blue:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-web:${BLUE_TAG:-blue}
    container_name: trade-web-blue
    restart: always
    depends_on:
      - api-blue
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
      DEPLOYMENT_SLOT: blue
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trade-network
    labels:
      - "deployment.slot=blue"
      - "deployment.active=true"

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: trade-nginx-lb
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "4000:4000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-blue
      - web-blue
    networks:
      - trade-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  trade-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_blue_data:
    driver: local
  worker_blue_data:
    driver: local
