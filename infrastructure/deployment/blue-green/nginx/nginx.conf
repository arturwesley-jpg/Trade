user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr slot: $upstream_http_x_deployment_slot';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

    # Active deployment slot (blue or green)
    map $cookie_deployment_slot $active_slot {
        default "blue";
        "green" "green";
    }

    # Upstream definitions
    upstream api_backend {
        least_conn;

        # Blue environment (active by default)
        server api-blue:4000 max_fails=3 fail_timeout=30s;

        # Green environment (standby)
        # server api-green:4000 max_fails=3 fail_timeout=30s backup;
    }

    upstream web_backend {
        least_conn;

        # Blue environment (active by default)
        server web-blue:80 max_fails=3 fail_timeout=30s;

        # Green environment (standby)
        # server web-green:80 max_fails=3 fail_timeout=30s backup;
    }

    # Health check endpoint
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # Include additional configurations
    include /etc/nginx/conf.d/*.conf;
}
