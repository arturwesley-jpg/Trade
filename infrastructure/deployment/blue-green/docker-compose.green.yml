version: '3.8'

# Green Environment - Staging/Next Release
services:
  # API Server - Green
  api-green:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-api:${GREEN_TAG:-green}
    container_name: trade-api-green
    restart: always
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DEPLOYMENT_SLOT: green
      DATABASE_URL: postgresql://${POSTGRES_USER:-trade_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trade_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
    volumes:
      - api_green_data:/app/data
    ports:
      - "4002:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trade-network
    labels:
      - "deployment.slot=green"
      - "deployment.active=false"

  # Worker - Green
  worker-green:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-worker:${GREEN_TAG:-green}
    container_name: trade-worker-green
    restart: always
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DEPLOYMENT_SLOT: green
      DATABASE_URL: postgresql://${POSTGRES_USER:-trade_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trade_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
    volumes:
      - worker_green_data:/app/data
    networks:
      - trade-network
    labels:
      - "deployment.slot=green"
      - "deployment.active=false"

  # Telegram Bot - Green
  telegram-bot-green:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-telegram-bot:${GREEN_TAG:-green}
    container_name: trade-telegram-bot-green
    restart: always
    depends_on:
      - api-green
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      DEPLOYMENT_SLOT: green
      API_BASE_URL: http://api-green:4000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN_GREEN}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS}
    networks:
      - trade-network
    labels:
      - "deployment.slot=green"
      - "deployment.active=false"

  # Web Frontend - Green
  web-green:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-trade}/trade-web:${GREEN_TAG:-green}
    container_name: trade-web-green
    restart: always
    depends_on:
      - api-green
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
      DEPLOYMENT_SLOT: green
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trade-network
    labels:
      - "deployment.slot=green"
      - "deployment.active=false"

networks:
  trade-network:
    external: true

volumes:
  api_green_data:
    driver: local
  worker_green_data:
    driver: local
