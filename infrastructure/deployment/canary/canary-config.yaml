apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: trading-bot-api
  namespace: trading-bot
spec:
  # Target deployment
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading-bot-api

  # Service configuration
  service:
    port: 3000
    targetPort: 3000
    portDiscovery: true

  # Progressive traffic shifting
  analysis:
    # Schedule interval (default 60s)
    interval: 1m

    # Max number of failed metric checks before rollback
    threshold: 5

    # Max traffic percentage routed to canary
    maxWeight: 50

    # Canary increment step
    stepWeight: 10

    # Metrics for canary analysis
    metrics:
      - name: request-success-rate
        # Minimum req success rate (non 5xx responses)
        thresholdRange:
          min: 99
        interval: 1m

      - name: request-duration
        # Maximum req duration P99
        thresholdRange:
          max: 500
        interval: 1m

      - name: error-rate
        # Maximum error rate
        thresholdRange:
          max: 1
        interval: 1m

    # Webhooks for notifications
    webhooks:
      - name: load-test
        type: pre-rollout
        url: http://flagger-loadtester.test/
        timeout: 5s
        metadata:
          type: bash
          cmd: "curl -sd 'test' http://trading-bot-api-canary:3000/api/health"

      - name: acceptance-test
        type: pre-rollout
        url: http://flagger-loadtester.test/
        timeout: 30s
        metadata:
          type: bash
          cmd: "curl -sd 'test' http://trading-bot-api-canary:3000/api/health && curl -sd 'test' http://trading-bot-api-canary:3000/api/metrics"

      - name: slack-notification
        type: event
        url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
        metadata:
          message: |
            Canary deployment {{ .Name }} in namespace {{ .Namespace }}
            Status: {{ .Status }}
            Phase: {{ .Phase }}
            Traffic Weight: {{ .CanaryWeight }}%

  # Canary deployment strategy
  canaryAnalysis:
    # Progressive traffic increase
    # 0% -> 10% -> 20% -> 30% -> 40% -> 50%
    stepWeight: 10
    maxWeight: 50

    # Promotion criteria
    # Promote to 100% if all metrics pass
    # Rollback if metrics fail threshold times

  # Skip analysis for specific conditions
  skipAnalysis: false

  # Automatically promote canary after successful analysis
  progressDeadlineSeconds: 600

---

apiVersion: v1
kind: Service
metadata:
  name: trading-bot-api
  namespace: trading-bot
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: trading-bot-api

---

apiVersion: v1
kind: Service
metadata:
  name: trading-bot-api-canary
  namespace: trading-bot
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: trading-bot-api
    version: canary

---

apiVersion: v1
kind: Service
metadata:
  name: trading-bot-api-primary
  namespace: trading-bot
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: trading-bot-api
    version: primary
