# ModSecurity Configuration for Trading Bot
# Based on OWASP Core Rule Set (CRS)

# -- Rule engine initialization ----------------------------------------------
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml application/json

# -- Request body handling ---------------------------------------------------
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyInMemoryLimit 131072
SecRequestBodyLimitAction Reject

# -- Response body handling --------------------------------------------------
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

# -- Filesystem configuration ------------------------------------------------
SecDataDir /tmp/modsecurity
SecTmpDir /tmp/modsecurity/tmp
SecUploadDir /tmp/modsecurity/upload
SecUploadKeepFiles Off

# -- Debug log configuration -------------------------------------------------
SecDebugLog /var/log/modsecurity/debug.log
SecDebugLogLevel 0
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# -- General Rules -----------------------------------------------------------
SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile unicode.mapping 20127

# -- Custom Rules for Trading Bot --------------------------------------------

# Block SQL Injection attempts
SecRule ARGS "@detectSQLi" \
    "id:1001,\
    phase:2,\
    block,\
    log,\
    msg:'SQL Injection Attack Detected',\
    severity:CRITICAL,\
    tag:'OWASP_CRS/WEB_ATTACK/SQL_INJECTION'"

# Block XSS attempts
SecRule ARGS "@detectXSS" \
    "id:1002,\
    phase:2,\
    block,\
    log,\
    msg:'XSS Attack Detected',\
    severity:CRITICAL,\
    tag:'OWASP_CRS/WEB_ATTACK/XSS'"

# Block command injection
SecRule ARGS "@rx (?:;|\||`|>|<|&|\$\(|\$\{)" \
    "id:1003,\
    phase:2,\
    block,\
    log,\
    msg:'Command Injection Attack Detected',\
    severity:CRITICAL,\
    tag:'OWASP_CRS/WEB_ATTACK/COMMAND_INJECTION'"

# Block path traversal
SecRule ARGS "@rx \.\.[/\\]" \
    "id:1004,\
    phase:2,\
    block,\
    log,\
    msg:'Path Traversal Attack Detected',\
    severity:CRITICAL,\
    tag:'OWASP_CRS/WEB_ATTACK/PATH_TRAVERSAL'"

# Rate limiting for API endpoints
SecAction \
    "id:1005,\
    phase:1,\
    nolog,\
    pass,\
    initcol:ip=%{REMOTE_ADDR},\
    setvar:ip.requests=+1,\
    expirevar:ip.requests=60"

SecRule IP:REQUESTS "@gt 100" \
    "id:1006,\
    phase:1,\
    block,\
    log,\
    msg:'Rate limit exceeded: %{ip.requests} requests in 60 seconds',\
    severity:WARNING,\
    tag:'RATE_LIMIT'"

# Block suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?:nikto|sqlmap|nmap|masscan|nessus|openvas|metasploit)" \
    "id:1007,\
    phase:1,\
    block,\
    log,\
    msg:'Malicious User Agent Detected',\
    severity:CRITICAL,\
    tag:'SECURITY_SCANNER'"

# Protect authentication endpoints
SecRule REQUEST_URI "@beginsWith /api/auth" \
    "id:1008,\
    phase:1,\
    pass,\
    nolog,\
    initcol:ip=%{REMOTE_ADDR},\
    setvar:ip.auth_attempts=+1,\
    expirevar:ip.auth_attempts=300"

SecRule IP:AUTH_ATTEMPTS "@gt 5" \
    "id:1009,\
    phase:1,\
    block,\
    log,\
    msg:'Too many authentication attempts',\
    severity:WARNING,\
    tag:'BRUTE_FORCE'"

# Block requests with no Accept header (likely bots)
SecRule &REQUEST_HEADERS:Accept "@eq 0" \
    "id:1010,\
    phase:1,\
    block,\
    log,\
    msg:'Request missing Accept header',\
    severity:WARNING,\
    tag:'PROTOCOL_VIOLATION'"

# Enforce JSON content type for API requests
SecRule REQUEST_URI "@beginsWith /api" \
    "chain,\
    id:1011,\
    phase:1,\
    block,\
    log,\
    msg:'Invalid Content-Type for API request'"
    SecRule REQUEST_METHOD "@rx ^(?:POST|PUT|PATCH)$" \
        "chain"
        SecRule &REQUEST_HEADERS:Content-Type "@eq 0"

# Block large payloads to prevent DoS
SecRule REQUEST_HEADERS:Content-Length "@gt 1048576" \
    "id:1012,\
    phase:1,\
    block,\
    log,\
    msg:'Request body too large',\
    severity:WARNING,\
    tag:'DOS_PROTECTION'"

# Detect and block JWT tampering attempts
SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer\s+[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]*$" \
    "id:1013,\
    phase:1,\
    pass,\
    nolog,\
    t:none"

# Block requests with suspicious query strings
SecRule QUERY_STRING "@rx (?:<script|javascript:|onerror=|onload=)" \
    "id:1014,\
    phase:1,\
    block,\
    log,\
    msg:'Malicious query string detected',\
    severity:CRITICAL,\
    tag:'XSS_ATTEMPT'"

# Protect against CSRF (require custom header for state-changing operations)
SecRule REQUEST_METHOD "@rx ^(?:POST|PUT|DELETE|PATCH)$" \
    "chain,\
    id:1015,\
    phase:1,\
    block,\
    log,\
    msg:'Missing CSRF protection header'"
    SecRule &REQUEST_HEADERS:X-Requested-With "@eq 0" \
        "chain"
        SecRule REQUEST_URI "!@beginsWith /api/auth/login"

# Block requests from known malicious IPs (example - customize as needed)
SecRule REMOTE_ADDR "@ipMatch 192.0.2.0/24" \
    "id:1016,\
    phase:1,\
    block,\
    log,\
    msg:'Request from blocked IP range',\
    severity:CRITICAL,\
    tag:'IP_BLACKLIST'"

# Detect and block directory listing attempts
SecRule REQUEST_URI "@rx (?:/\.git|/\.env|/\.svn|/\.htaccess|/web\.config)" \
    "id:1017,\
    phase:1,\
    block,\
    log,\
    msg:'Attempt to access sensitive files',\
    severity:CRITICAL,\
    tag:'INFORMATION_DISCLOSURE'"

# Block null bytes in requests
SecRule REQUEST_URI|ARGS|REQUEST_HEADERS "@validateByteRange 1-255" \
    "id:1018,\
    phase:1,\
    block,\
    log,\
    msg:'Null byte detected in request',\
    severity:CRITICAL,\
    tag:'PROTOCOL_VIOLATION'"

# Enforce HTTPS (if behind reverse proxy)
SecRule REQUEST_HEADERS:X-Forwarded-Proto "!@streq https" \
    "id:1019,\
    phase:1,\
    block,\
    log,\
    msg:'HTTPS required',\
    severity:WARNING,\
    tag:'PROTOCOL_ENFORCEMENT'"

# -- OWASP CRS Integration ---------------------------------------------------
# Include OWASP Core Rule Set (install separately)
# Include /etc/modsecurity/crs/crs-setup.conf
# Include /etc/modsecurity/crs/rules/*.conf
