# AWS CloudFront CDN Configuration for Trading Bot
# Apply via AWS CLI or CloudFormation

AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFront Distribution for Trading Bot'

Parameters:
  DomainName:
    Type: String
    Default: 'trade-bot.com'
    Description: 'Domain name for the distribution'

  OriginDomain:
    Type: String
    Default: 'origin.trade-bot.com'
    Description: 'Origin server domain'

  ACMCertificateArn:
    Type: String
    Description: 'ARN of ACM certificate for SSL/TLS'

Resources:
  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: 'Trading Bot CDN Distribution'

        # Origins
        Origins:
          - Id: WebOrigin
            DomainName: !Ref OriginDomain
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: 'https-only'
              OriginSSLProtocols:
                - TLSv1.2
                - TLSv1.3
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5
            OriginCustomHeaders:
              - HeaderName: 'X-Origin-Verify'
                HeaderValue: !Sub '${AWS::StackName}-secret'

        # Default Cache Behavior
        DefaultCacheBehavior:
          TargetOriginId: WebOrigin
          ViewerProtocolPolicy: 'redirect-to-https'
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: !Ref DefaultCachePolicy
          OriginRequestPolicyId: !Ref DefaultOriginRequestPolicy
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

        # Cache Behaviors for specific paths
        CacheBehaviors:
          # Static Assets - Long Cache
          - PathPattern: '/static/*'
            TargetOriginId: WebOrigin
            ViewerProtocolPolicy: 'redirect-to-https'
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: !Ref StaticAssetsCachePolicy

          # API - No Cache
          - PathPattern: '/api/*'
            TargetOriginId: WebOrigin
            ViewerProtocolPolicy: 'redirect-to-https'
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            Compress: true
            CachePolicyId: !Ref NoCachePolicy
            OriginRequestPolicyId: !Ref APIOriginRequestPolicy

        # Custom Error Responses
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: '/404.html'
            ErrorCachingMinTTL: 300
          - ErrorCode: 500
            ResponseCode: 500
            ResponsePagePath: '/500.html'
            ErrorCachingMinTTL: 0
          - ErrorCode: 503
            ResponseCode: 503
            ResponsePagePath: '/503.html'
            ErrorCachingMinTTL: 0

        # SSL/TLS Configuration
        ViewerCertificate:
          AcmCertificateArn: !Ref ACMCertificateArn
          SslSupportMethod: 'sni-only'
          MinimumProtocolVersion: 'TLSv1.2_2021'

        # Domain Names
        Aliases:
          - !Ref DomainName
          - !Sub 'www.${DomainName}'

        # Logging
        Logging:
          Bucket: !GetAtt LogsBucket.DomainName
          Prefix: 'cloudfront/'
          IncludeCookies: false

        # HTTP Version
        HttpVersion: 'http2and3'

        # IPv6
        IPV6Enabled: true

        # Price Class
        PriceClass: 'PriceClass_All'

        # WAF
        WebACLId: !GetAtt WebACL.Arn

  # Cache Policies
  DefaultCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-default-cache'
        DefaultTTL: 86400  # 1 day
        MaxTTL: 31536000  # 1 year
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: 'none'
          HeadersConfig:
            HeaderBehavior: 'none'
          CookiesConfig:
            CookieBehavior: 'none'

  StaticAssetsCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-static-assets'
        DefaultTTL: 31536000  # 1 year
        MaxTTL: 31536000
        MinTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: 'none'
          HeadersConfig:
            HeaderBehavior: 'none'
          CookiesConfig:
            CookieBehavior: 'none'

  NoCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-no-cache'
        DefaultTTL: 0
        MaxTTL: 0
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig:
            QueryStringBehavior: 'all'
          HeadersConfig:
            HeaderBehavior: 'allViewer'
          CookiesConfig:
            CookieBehavior: 'all'

  # Origin Request Policies
  DefaultOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub '${AWS::StackName}-default-origin'
        QueryStringsConfig:
          QueryStringBehavior: 'none'
        HeadersConfig:
          HeaderBehavior: 'whitelist'
          Headers:
            - 'CloudFront-Viewer-Country'
            - 'CloudFront-Is-Mobile-Viewer'
        CookiesConfig:
          CookieBehavior: 'none'

  APIOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub '${AWS::StackName}-api-origin'
        QueryStringsConfig:
          QueryStringBehavior: 'all'
        HeadersConfig:
          HeaderBehavior: 'allViewer'
        CookiesConfig:
          CookieBehavior: 'all'

  # Response Headers Policy
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${AWS::StackName}-security-headers'
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: 'DENY'
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: 'strict-origin-when-cross-origin'
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;"
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: 'X-Content-Type-Options'
              Value: 'nosniff'
              Override: true
            - Header: 'Permissions-Policy'
              Value: 'geolocation=(), microphone=(), camera=()'
              Override: true

  # WAF Web ACL
  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${AWS::StackName}-waf'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      Rules:
        # Rate Limiting
        - Name: RateLimitRule
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitRule

        # AWS Managed Rules - Core Rule Set
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet

        # AWS Managed Rules - Known Bad Inputs
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet

      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${AWS::StackName}-waf'

  # S3 Bucket for Logs
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-cloudfront-logs'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

Outputs:
  DistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution

  DistributionDomainName:
    Description: 'CloudFront Distribution Domain Name'
    Value: !GetAtt CloudFrontDistribution.DomainName

  WebACLId:
    Description: 'WAF Web ACL ID'
    Value: !GetAtt WebACL.Arn
