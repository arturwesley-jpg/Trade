services:
  # API Service
  - type: web
    name: trade-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    repo: https://github.com/arturwesley-jpg/Trade.git
    buildCommand: npm install --legacy-peer-deps && npm run build -w src/packages/database && npm run build -w src/packages/shared && npm run build -w src/packages/trading-core && npm run build -w src/packages/exchange && npm run build -w src/apps/api
    startCommand: node src/apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        value: "postgresql://postgres:Furia%40090186@db.fzwwqjetueqimwioaksf.supabase.co:5432/postgres"
      - key: REDIS_URL
        value: "redis://default:gQAAAAAAAdatAAIgcDJlY2JhOWQzOGJhYWQ0MDI5YTU5MzM4NWM4Mzg4OTFlMA@steady-bobcat-120493.upstash.io:6379"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: LOG_LEVEL
        value: info

  # Telegram Bot Service
  - type: web
    name: trade-telegram-bot
    runtime: node
    region: oregon
    plan: free
    branch: main
    repo: https://github.com/arturwesley-jpg/Trade.git
    buildCommand: npm install --legacy-peer-deps && npm run build -w src/packages/database && npm run build -w src/packages/shared && npm run build -w src/apps/telegram-bot
    startCommand: node src/apps/telegram-bot/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: API_BASE_URL
        fromService:
          name: trade-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        value: "postgresql://postgres:Furia%40090186@db.fzwwqjetueqimwioaksf.supabase.co:5432/postgres"
      - key: REDIS_URL
        value: "redis://default:gQAAAAAAAdatAAIgcDJlY2JhOWQzOGJhYWQ0MDI5YTU5MzM4NWM4Mzg4OTFlMA@steady-bobcat-120493.upstash.io:6379"
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: WEB_ORIGIN
        fromService:
          name: trade-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
