groups:
  - name: trading_bot_alerts
    interval: 30s
    rules:
      # API Health
      - alert: APIDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API service is down"
          description: "API service has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(trade_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec"

      # Performance
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(trade_http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "P95 latency is {{ $value }}s"

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB"

      # Trading
      - alert: NoTradesExecuted
        expr: rate(trade_trades_total[1h]) == 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "No trades executed"
          description: "No trades have been executed in the last 2 hours"

      - alert: HighTradeFailureRate
        expr: rate(trade_trades_total{status="failed"}[5m]) / rate(trade_trades_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High trade failure rate"
          description: "Trade failure rate is {{ $value | humanizePercentage }}"

      # Market Data
      - alert: ProviderDown
        expr: rate(trade_provider_errors_total[5m]) / rate(trade_market_data_ticks_total[5m]) > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Market data provider degraded"
          description: "Provider {{ $labels.provider }} error rate is {{ $value | humanizePercentage }}"

      - alert: HighProviderLatency
        expr: histogram_quantile(0.95, rate(trade_market_data_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High provider latency"
          description: "Provider {{ $labels.provider }} P95 latency is {{ $value }}s"

      # Database
      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(trade_db_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries"
          description: "P95 query duration is {{ $value }}s"

      # Redis
      - alert: LowCacheHitRate
        expr: rate(trade_cache_hits_total[5m]) / (rate(trade_cache_hits_total[5m]) + rate(trade_cache_misses_total[5m])) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"
